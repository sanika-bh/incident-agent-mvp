databases:
  - name: incident-agent-demo-db
    plan: basic-256mb
    databaseName: incident_agent_demo
    user: incident_agent

services:
  - type: redis
    name: incident-agent-demo-redis
    plan: starter
    ipAllowList: []

  - type: web
    name: incident-agent-gateway
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn gateway.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: incident-agent-demo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: incident-agent-demo-redis
          property: connectionString
      - key: DATADOG_WEBHOOK_TOKEN
        generateValue: true
      - key: DEMO_TRIGGER_TOKEN
        generateValue: true
      - key: DEMO_ENVIRONMENT
        value: demo
      - key: DEMO_HOSTING_TARGET
        value: render
      - key: GATEWAY_BASE_URL
        value: https://incident-agent-gateway.onrender.com

  - type: web
    name: incident-agent-interface
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn interface.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: incident-agent-demo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: incident-agent-demo-redis
          property: connectionString
      - key: DEMO_BASE_URL
        value: https://incident-agent-interface.onrender.com
      - key: GATEWAY_BASE_URL
        value: https://incident-agent-gateway.onrender.com
      - key: APPROVAL_SIGNING_SECRET
        generateValue: true
      - key: DEMO_ENVIRONMENT
        value: demo
      - key: DEMO_HOSTING_TARGET
        value: render

  - type: worker
    name: incident-agent-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m agent.loop
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: incident-agent-demo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: incident-agent-demo-redis
          property: connectionString
      - key: DEMO_BASE_URL
        value: https://incident-agent-interface.onrender.com
      - key: GATEWAY_BASE_URL
        value: https://incident-agent-gateway.onrender.com
      - key: APPROVAL_SIGNING_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: REQUIRE_APPROVAL
        value: "true"
      - key: DEMO_ENVIRONMENT
        value: demo
      - key: DEMO_HOSTING_TARGET
        value: render
